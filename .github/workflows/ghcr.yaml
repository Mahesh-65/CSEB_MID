name: CSEB_MID Docker Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/mahesh-65/cseb_mid:latest

jobs:

# 1 Checkout
  checkout:
    name: Checkout Source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

# 2 Build Docker Image
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - uses: actions/checkout@v3

      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME .

# 3 Trivy Scan
  trivy:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v3

      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          exit-code: 1
          severity: HIGH,MEDIUM

# 4 Push Image to GHCR
  docker-push:
    name: Push Docker Image to GHCR
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - uses: actions/checkout@v3

      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME .

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Image
        run: |
          docker push $IMAGE_NAME

# 5 Success Email
  success-email:
    name: Success Mail
    runs-on: ubuntu-latest
    needs: docker-push
    if: success()

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CSEB_MID GHCR Pipeline Success"
          body: |
            Hello Team,

            Docker image built, scanned and pushed successfully.

            Image:
            ${{ env.IMAGE_NAME }}

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Regards,
            DevSecOps Pipeline
          to: ${{ secrets.DEVOPS_EMAIL }}
          from: DevOps Alert

# 6 Failure Email
  failure-email:
    name: Failure Mail
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CSEB_MID GHCR Pipeline Failed"
          body: |
            Hello Team,

            Docker / Trivy / GHCR pipeline failed.

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Regards,
            DevSecOps Pipeline
          to: ${{ secrets.DEVOPS_EMAIL }}
          from: DevOps Alert