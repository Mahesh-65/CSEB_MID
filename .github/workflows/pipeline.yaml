name: CSEB_MID CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  checkout:
    name: Checkout Source Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

  dependencies:
    name: Install Dependencies
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

  sonar:
    name: SonarQube Scan + Quality Gate
    runs-on: ubuntu-latest
    needs: dependencies

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: temurin

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=CSEB_MID
            -Dsonar.projectName=CSEB_MID
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  snyk:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Snyk Scan (Do Not Fail)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --exit-code=0

  success-email:
    name: Send Success Email
    runs-on: ubuntu-latest
    needs: snyk
    if: success()

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CSEB_MID CI Pipeline Success"
          body: |
            Hello Team,

            CI pipeline completed successfully.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Regards,
            DevSecOps Pipeline
          to: ${{ secrets.DEVOPS_EMAIL }}
          from: DevOps Alert

  failure-email:
    name: Send Failure Email
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CSEB_MID CI Pipeline Failed"
          body: |
            Hello Team,

            CI pipeline failed.

            Repository: ${{ github.repository }}

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Regards,
            DevSecOps Pipeline
          to: ${{ secrets.DEVOPS_EMAIL }}
          from: DevOps Alert