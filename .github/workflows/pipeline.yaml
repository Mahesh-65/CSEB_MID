name: CSEB_MID CI Pipeline

on:
  push:
    branches:
      - main

jobs:

# 1 Checkout
  checkout:
    name: Checkout Source Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

# 2 Dependencies
  dependencies:
    name: Install Dependencies
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

# 3 SonarQube Scan
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: dependencies

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: temurin

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=CSEB_MID
            -Dsonar.projectName=CSEB_MID
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

# 4 Quality Gate
  qualitygate:
    name: Sonar Quality Gate
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

# 5 Snyk
  snyk:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    needs: qualitygate

    steps:
      - uses: actions/checkout@v3

      - name: Run Snyk Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium

# 6 Success Mail
  success-email:
    name: Send Success Mail
    runs-on: ubuntu-latest
    needs: snyk
    if: success()

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CSEB_MID CI Pipeline Success"
          body: |
            Hello Team,

            CI Security Pipeline completed successfully.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Regards,
            DevSecOps Pipeline
          to: ${{ secrets.DEVOPS_EMAIL }}
          from: DevOps Alert

# 7 Failure Mail
  failure-email:
    name: Send Failure Mail
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CSEB_MID CI Pipeline Failed"
          body: |
            Hello Team,

            CI Pipeline failed.

            Repository: ${{ github.repository }}

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Regards,
            DevSecOps Pipeline
          to: ${{ secrets.DEVOPS_EMAIL }}
          from: DevOps Alert